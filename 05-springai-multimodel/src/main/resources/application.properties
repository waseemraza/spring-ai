spring.application.name=05-springai-multimodel

# Normally springboot instantiate ChatClient builder based on the model library in class path.
# But in case of multi-model, we should disable this feature. Otherwise, sprinboot will not know which ChatClient should be created as primary bean.
# We should disable auto-chatclient configuration. Configure Beans explicitly based on the chatclients we want.
spring.ai.chat.client.enabled=false

spring.ai.openai.api-key=${OPEN_AI_KEY}
spring.ai.ollama.chat.model=llama3.2:1b
